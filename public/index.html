<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ぷちSNS</title>
<meta name="description" content="登録不要で気軽につぶやける小さなSNS。いいねや返信もできます。" />
<meta name="theme-color" content="#16a34a" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="ぷちSNS" />
<meta property="og:title" content="ぷちSNS" />
<meta property="og:description" content="登録不要で気軽につぶやける小さなSNS。いいねや返信もできます。" />
<meta name="twitter:card" content="summary" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1>ぷちSNS</h1>
  </header>

  <main>
    <form id="post-form" class="post-form">
      <input
        id="username-input"
        type="text"
        placeholder="ユーザー名（省略可）"
        maxlength="64"
        autocomplete="off"
      />
      <p class="trip-hint">💡 名前を「けい#ひみつ」のようにすると「けい◆xxxx」と表示され、同じ合言葉を知る本人だけが同じ◆を出せます（なりすまし防止）</p>
      <textarea
        id="content-input"
        placeholder="いまどうしてる？"
        maxlength="280"
        rows="3"
        required
      ></textarea>
      <div class="post-form-footer">
        <span id="char-count" class="char-count">0 / 280</span>
        <button type="submit">投稿する</button>
      </div>
      <p id="error-message" class="error-message" hidden></p>
    </form>

    <ul id="post-list" class="post-list"></ul>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
